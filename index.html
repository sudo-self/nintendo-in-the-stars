<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo in the Stars</title>
    <link rel="icon" href="docs/favicon.ico" sizes="16x16 32x32 48x48 64x64" type="image/vnd.microsoft.icon">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: black;
            color: white;
            overflow: hidden;
        }
        #game {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .logo {
            width: 130px;
            height: 130px;
            filter: drop-shadow(0 0 10px white);
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="game">
        <img src="docs/Logo.png" alt="Logo" class="logo">
        <input type="file" id="input" accept=".nes,.zip" style="display: none;">
        <button onclick="document.getElementById('input').click();">Load Game</button>
    </div>

    <script>
        let enableDebug = false; // Change as necessary
        const supportedCores = {
            "nes": ["nes", "zip"]
        };

        const input = document.getElementById("input");

        input.onchange = async () => {
            const file = input.files[0];
            const parts = file.name.split(".");
            const ext = parts.pop().toLowerCase();

            // Check if the file extension is supported (.nes or .zip)
            if (!supportedCores["nes"].includes(ext)) {
                alert("Unsupported file type. Please upload a .nes or .zip file.");
                return;
            }

            // Create a URL for the selected ROM file
            const fileUrl = URL.createObjectURL(file);

            // EmulatorJS configuration
            window.EJS_player = "#game";
            window.EJS_core = "nes";
            window.EJS_color = "#000000";
            window.EJS_startOnLoaded = true;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_gameUrl = fileUrl; // Load the selected file

            // Load the emulator script
            const script = document.createElement("script");
            script.src = "data/loader.js"; // Make sure this path is correct
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
